<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>
  <!-- Left leg of A -->
  <polygon points="12,88 38,12 48,12 22,88" fill="#00FF7F"/>
  <!-- Right leg of A -->
  <polygon points="52,12 62,12 88,88 72,88" fill="#00FF7F"/>
  <!-- Crossbar of A -->
  <rect x="30" y="50" width="40" height="10" fill="#00FF7F"/>
  <!-- Slash cut through lower-left leg (the diagonal mark) -->
  <polygon points="12,75 38,58 42,67 16,84" fill="#000000"/>
  <!-- Second parallel slash for the ≠ style double-cut -->
  <polygon points="19,86 45,69 49,78 23,95" fill="#000000"/>
</svg>
